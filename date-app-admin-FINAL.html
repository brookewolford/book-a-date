<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Book a Date With Me</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --blush: #F2C4CE; --rose: #C0566B; --deep: #7A2035;
    --cream: #FDF6F8; --soft: #FAE8ED; --text: #2A1218; --muted: #9E6070; --white: #FFFFFF;
    --accepted: #4A8C5C; --accepted-bg: #EBF5EF;
    --review: #C07030; --review-bg: #FFF3E6;
    --rejected: #8B2020; --rejected-bg: #FDEDED;
    --pending: #6B6B8A; --pending-bg: #F0F0F6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #F5F5F8; color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--white); border-radius: 24px; padding: 48px 40px;
    border: 1px solid var(--blush); width: 100%; max-width: 400px; text-align: center;
  }
  .login-card h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--rose); margin-bottom: 8px; }
  .login-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }
  .login-card input {
    width: 100%; background: var(--soft); border: 1.5px solid var(--blush); border-radius: 12px;
    padding: 14px 18px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
    outline: none; margin-bottom: 14px; -webkit-appearance: none;
  }
  .login-card input:focus { border-color: var(--rose); background: var(--white); }
  .btn-login {
    width: 100%; background: var(--rose); color: var(--white); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 16px; border-radius: 50px; cursor: pointer; transition: all 0.2s;
  }
  .btn-login:hover { background: var(--deep); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--deep); font-size: 0.82rem; margin-top: 12px; }

  /* LAYOUT */
  .admin-wrap { display: none; }
  .admin-header {
    background: var(--white); border-bottom: 1px solid var(--blush); padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .admin-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.1rem; color: var(--rose); }
  .admin-logo span { color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 400; margin-left: 10px; }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .btn-sm {
    background: none; border: 1.5px solid var(--blush); color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 500; padding: 7px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:hover { border-color: var(--rose); color: var(--rose); }

  .admin-body { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar { background: var(--white); border-right: 1px solid var(--blush); overflow-y: auto; }
  .sidebar-header {
    padding: 20px 20px 12px; border-bottom: 1px solid var(--soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 { font-size: 0.85rem; font-weight: 600; color: var(--text); }
  .count-badge {
    background: var(--soft); color: var(--rose); font-size: 0.72rem; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }
  .filter-tabs { display: flex; padding: 12px 20px; gap: 6px; border-bottom: 1px solid var(--soft); }
  .filter-tab {
    background: none; border: 1px solid var(--blush); color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; font-weight: 500; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  .filter-tab.active { background: var(--rose); color: var(--white); border-color: var(--rose); }
  .applicant-list { overflow-y: auto; }
  .applicant-row {
    padding: 16px 20px; border-bottom: 1px solid var(--soft); cursor: pointer;
    transition: background 0.15s; display: flex; gap: 14px; align-items: flex-start;
  }
  .applicant-row:hover { background: var(--soft); }
  .applicant-row.selected { background: var(--soft); border-left: 3px solid var(--rose); }
  .applicant-avatar {
    width: 42px; height: 42px; border-radius: 10px; background: var(--soft);
    border: 1px solid var(--blush); overflow: hidden; flex-shrink: 0;
  }
  .applicant-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .applicant-avatar .no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .applicant-info { flex: 1; min-width: 0; }
  .applicant-info .name { font-weight: 600; font-size: 0.88rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .applicant-info .meta { font-size: 0.76rem; color: var(--muted); }
  .status-pill {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
  }
  .status-pill.pending { background: var(--pending-bg); color: var(--pending); }
  .status-pill.review { background: var(--review-bg); color: var(--review); }
  .status-pill.accepted { background: var(--accepted-bg); color: var(--accepted); }
  .status-pill.rejected { background: var(--rejected-bg); color: var(--rejected); }

  /* DETAIL PANEL */
  .detail-panel { padding: 32px; overflow-y: auto; background: #F5F5F8; }
  .detail-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-size: 0.9rem; font-style: italic;
  }
  .detail-card { background: var(--white); border-radius: 20px; padding: 28px; border: 1px solid var(--blush); margin-bottom: 20px; }
  .detail-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
  .detail-photos { display: flex; gap: 10px; flex-wrap: wrap; }
  .detail-photo {
    width: 90px; height: 90px; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--blush); cursor: pointer; transition: transform 0.15s;
  }
  .detail-photo:hover { transform: scale(1.03); }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
  .detail-name-block { flex: 1; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .detail-ig { color: var(--rose); font-size: 0.9rem; margin-bottom: 8px; }
  .detail-meta { font-size: 0.82rem; color: var(--muted); }
  .detail-meta span { margin-right: 14px; }

  .field-group { margin-bottom: 20px; }
  .field-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field-value { font-size: 0.9rem; color: var(--text); line-height: 1.6; }

  .video-player { width: 100%; border-radius: 12px; background: #000; max-height: 280px; margin-top: 8px; }

  .action-bar { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 4px; }
  .action-btn {
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 11px 22px; border-radius: 50px; cursor: pointer; transition: all 0.2s; border: none;
  }
  .action-btn.accept { background: var(--accepted); color: var(--white); }
  .action-btn.accept:hover { background: #3A7A4C; }
  .action-btn.review-btn { background: var(--review-bg); color: var(--review); border: 1px solid #F0C090; }
  .action-btn.review-btn:hover { background: #FFDBB0; }
  .action-btn.reject { background: var(--rejected-bg); color: var(--rejected); border: 1px solid #F0C0C0; }
  .action-btn.reject:hover { background: #FBDDDD; }

  .notes-textarea {
    width: 100%; background: var(--soft); border: 1.5px solid var(--blush); border-radius: 12px;
    padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text);
    outline: none; resize: vertical; min-height: 80px; margin-bottom: 12px;
  }
  .notes-textarea:focus { border-color: var(--rose); background: var(--white); }
  .save-notes-btn {
    background: var(--soft); color: var(--rose); border: 1.5px solid var(--blush);
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 9px 20px; border-radius: 50px; cursor: pointer; transition: all 0.2s;
  }
  .save-notes-btn:hover { background: var(--rose); color: var(--white); border-color: var(--rose); }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .lightbox-close {
    position: fixed; top: 20px; right: 24px; color: white; font-size: 1.6rem;
    cursor: pointer; background: none; border: none; font-weight: 300;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--deep); color: var(--white); padding: 13px 26px; border-radius: 50px;
    font-size: 0.86rem; font-weight: 500; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state { text-align: center; padding: 40px; color: var(--muted); }

  @media (max-width: 768px) {
    .admin-body { grid-template-columns: 1fr; }
    .detail-panel { display: none; }
    .detail-panel.mobile-open { display: block; position: fixed; inset: 60px 0 0; background: #F5F5F8; z-index: 50; overflow-y: auto; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <h1>Admin Access</h1>
    <p>Book a Date With Me</p>
    <input type="email" id="login-email" placeholder="Email address" onkeyup="if(event.key==='Enter') doLogin()" />
    <input type="password" id="login-password" placeholder="Password" onkeyup="if(event.key==='Enter') doLogin()" />
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="admin-wrap" class="admin-wrap">
  <div class="admin-header">
    <div>
      <div class="admin-logo">Book a Date With Me <span>Admin</span></div>
    </div>
    <div class="header-right">
      <button class="btn-sm" onclick="loadApplicants()">Refresh</button>
      <button class="btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Applicants</h2>
        <div class="count-badge" id="applicant-count">0</div>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('pending', this)">New</button>
        <button class="filter-tab" onclick="setFilter('review', this)">Review</button>
        <button class="filter-tab" onclick="setFilter('accepted', this)">Accepted</button>
        <button class="filter-tab" onclick="setFilter('rejected', this)">Rejected</button>
      </div>
      <div class="applicant-list" id="applicant-list">
        <div class="loading-state">Loading...</div>
      </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <div style="font-size:2rem;margin-bottom:12px;">👈</div>
        Select an applicant to review
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<div id="toast" class="toast"></div>

<script>
  // ============================================
  // CONFIGURATION — same values as index.html
  // ============================================
  const SUPABASE_URL = 'https://hftbnxexmikbuqswdalf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmdGJueGV4bWlrYnVxc3dkYWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTA2NzYsImV4cCI6MjA5ODA2NjY3Nn0.3fn-8o8pezoFrGoXdWvpfJHnAecq08c6Wvazv96mkwg';
  // ============================================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allApplicants = [];
  let currentFilter = 'all';
  let selectedId = null;

  // ---- AUTH ----
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    if (!email || !password) { err.textContent = 'Enter email and password.'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    err.textContent = '';
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      err.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      showAdmin();
    }
  }

  async function doLogout() {
    await supabase.auth.signOut();
    document.getElementById('admin-wrap').style.display = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
  }

  async function checkSession() {
    const { data } = await supabase.auth.getSession();
    if (data?.session) showAdmin();
  }

  function showAdmin() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadApplicants();
  }

  checkSession();

  // ---- LOAD APPLICANTS ----
  async function loadApplicants() {
    document.getElementById('applicant-list').innerHTML = '<div class="loading-state">Loading...</div>';
    const { data, error } = await supabase
      .from('applications')
      .select('*')
      .order('queue_position', { ascending: true });

    if (error) { document.getElementById('applicant-list').innerHTML = '<div class="loading-state">Error loading.</div>'; return; }
    allApplicants = data || [];
    renderList();
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function renderList() {
    const filtered = currentFilter === 'all' ? allApplicants : allApplicants.filter(a => a.status === currentFilter);
    document.getElementById('applicant-count').textContent = filtered.length;
    if (filtered.length === 0) {
      document.getElementById('applicant-list').innerHTML = '<div class="loading-state" style="font-style:italic;">No applicants in this category.</div>';
      return;
    }
    document.getElementById('applicant-list').innerHTML = filtered.map(a => `
      <div class="applicant-row ${selectedId === a.id ? 'selected' : ''}" onclick="selectApplicant('${a.id}')">
        <div class="applicant-avatar">
          ${a.photo_urls && a.photo_urls.length > 0
            ? `<img src="${a.photo_urls[0]}" alt="${a.full_name}" />`
            : `<div class="no-photo">👤</div>`}
        </div>
        <div class="applicant-info">
          <div class="name">${a.full_name}</div>
          <div class="meta">${a.instagram} &nbsp;·&nbsp; Age ${a.age} &nbsp;·&nbsp; #${a.queue_position}</div>
        </div>
        <div class="status-pill ${a.status}">${a.status}</div>
      </div>
    `).join('');
  }

  // ---- SELECT APPLICANT ----
  function selectApplicant(id) {
    selectedId = id;
    renderList();
    const a = allApplicants.find(x => x.id === id);
    if (!a) return;

    const panel = document.getElementById('detail-panel');
    const statusLabels = { pending: 'New', review: 'Under Review', accepted: 'Accepted', rejected: 'Rejected' };

    panel.innerHTML = `
      <div class="detail-card">
        <div class="detail-header">
          <div>
            ${a.photo_urls && a.photo_urls.length > 0 ? `
              <div class="detail-photos">
                ${a.photo_urls.map(url => `
                  <div class="detail-photo" onclick="openLightbox('${url}')">
                    <img src="${url}" alt="${a.full_name}" />
                  </div>`).join('')}
              </div>` : '<div style="color:var(--muted);font-size:0.82rem;font-style:italic;">No photos submitted</div>'}
          </div>
          <div class="detail-name-block">
            <div class="detail-name">${a.full_name}</div>
            <div class="detail-ig">${a.instagram}</div>
            <div class="detail-meta">
              <span>Age ${a.age}</span>
              <span>Queue #${a.queue_position}</span>
              <span>${new Date(a.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
            </div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">Why they should be picked</div>
          <div class="field-value">${a.why_me}</div>
        </div>
        <div class="field-group">
          <div class="field-label">Date idea</div>
          <div class="field-value">${a.date_idea}</div>
        </div>
        ${a.dealbreakers ? `<div class="field-group"><div class="field-label">Dealbreakers</div><div class="field-value">${a.dealbreakers}</div></div>` : ''}
        ${a.vouched_by ? `<div class="field-group"><div class="field-label">Vouched by</div><div class="field-value">${a.vouched_by}</div></div>` : ''}

        ${a.video_url ? `
          <div class="field-group">
            <div class="field-label">Video</div>
            <video class="video-player" controls src="${a.video_url}"></video>
          </div>` : ''}

        <div class="field-group">
          <div class="field-label">Current Status</div>
          <div class="action-bar">
            <button class="action-btn accept ${a.status === 'accepted' ? 'active' : ''}" onclick="updateStatus('${a.id}', 'accepted')">Accept</button>
            <button class="action-btn review-btn" onclick="updateStatus('${a.id}', 'review')">Mark Review</button>
            <button class="action-btn reject" onclick="updateStatus('${a.id}', 'rejected')">Reject</button>
          </div>
        </div>
      </div>

      <div class="detail-card">
        <div class="field-label" style="margin-bottom:10px;">Admin Notes</div>
        <textarea class="notes-textarea" id="admin-notes-${a.id}" placeholder="Private notes about this applicant...">${a.admin_notes || ''}</textarea>
        <button class="save-notes-btn" onclick="saveNotes('${a.id}')">Save Notes</button>
      </div>
    `;
  }

  // ---- UPDATE STATUS ----
  async function updateStatus(id, status) {
    const { error } = await supabase.from('applications').update({ status }).eq('id', id);
    if (error) { showToast('Update failed.'); return; }
    const idx = allApplicants.findIndex(a => a.id === id);
    if (idx > -1) allApplicants[idx].status = status;
    renderList();
    selectApplicant(id);
    showToast('Status updated to ' + status + '.');
  }

  // ---- SAVE NOTES ----
  async function saveNotes(id) {
    const notes = document.getElementById('admin-notes-' + id).value;
    const { error } = await supabase.from('applications').update({ admin_notes: notes }).eq('id', id);
    if (error) { showToast('Could not save notes.'); return; }
    const idx = allApplicants.findIndex(a => a.id === id);
    if (idx > -1) allApplicants[idx].admin_notes = notes;
    showToast('Notes saved.');
  }

  // ---- LIGHTBOX ----
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  // ---- TOAST ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
